name: Stock Feishu Robot

on:
  schedule:
    - cron: '7 9 * * 1-5'
      timezone: 'Asia/Shanghai'   # 早报 09:07
    - cron: '17 13 * * 1-5'
      timezone: 'Asia/Shanghai'   # 午报 12:17
    - cron: '27 17 * * 1-5'
      timezone: 'Asia/Shanghai'   # 晚报 17:27

  workflow_dispatch:

jobs:
  morning:
    name: 早报
    runs-on: ubuntu-latest
    if: github.event.schedule == '7 9 * * 1-5' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
        working-directory: stock-feishu-robot

      - run: node morning.js
        working-directory: stock-feishu-robot
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

  noon:
    name: 午报
    runs-on: ubuntu-latest
    if: github.event.schedule == '17 12 * * 1-5' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
        working-directory: stock-feishu-robot

      - run: node noon.js
        working-directory: stock-feishu-robot
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

  evening:
    name: 晚报
    runs-on: ubuntu-latest
    if: github.event.schedule == '27 17 * * 1-5' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
        working-directory: stock-feishu-robot

      - run: node evening.js
        working-directory: stock-feishu-robot
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}