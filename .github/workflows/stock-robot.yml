name: Stock Feishu Robot

on:
  schedule:
    # 北京时间 = UTC+8，GitHub Actions 用 UTC
    - cron: '0 1 * * 1-5'   # 早报 09:00 BJT
    - cron: '7 6 * * 1-5'    # 午报测试 UTC 06:07（测试完改回 '0 4 * * 1-5'）
    - cron: '0 9 * * 1-5'   # 晚报 17:00 BJT

  workflow_dispatch:

jobs:
  morning:
    name: 早报
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 1 * * 1-5' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
        working-directory: stock-feishu-robot

      - run: node morning.js
        working-directory: stock-feishu-robot
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

  noon:
    name: 午报
    runs-on: ubuntu-latest
    if: github.event.schedule == '7 6 * * 1-5' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
        working-directory: stock-feishu-robot

      - run: node noon.js
        working-directory: stock-feishu-robot
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

  evening:
    name: 晚报
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * 1-5' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
        working-directory: stock-feishu-robot

      - run: node evening.js
        working-directory: stock-feishu-robot
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
