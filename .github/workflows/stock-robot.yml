name: Stock Feishu Robot

on:
  schedule:
    # 北京时间 = UTC+8，GitHub Actions 用 UTC
    # 说明：整点 cron 排队严重（延迟 10~30min），一律用非整点、偏移到目标时间之前几分钟
    - cron: '17 22 * * 0-4'  # 早报 BJT 06:17（UTC 前一天 22:17）
    - cron: '17 1 * * 1-5'   # 午报 BJT 09:17
    - cron: '17 6 * * 1-5'   # 晚报 BJT 14:17

  workflow_dispatch:

jobs:
  morning:
    name: 早报
    runs-on: ubuntu-latest
    if: github.event.schedule == '17 22 * * 0-4' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
        working-directory: stock-feishu-robot

      - run: node morning.js
        working-directory: stock-feishu-robot
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

  noon:
    name: 午报
    runs-on: ubuntu-latest
    if: github.event.schedule == '17 1 * * 1-5' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
        working-directory: stock-feishu-robot

      - run: node noon.js
        working-directory: stock-feishu-robot
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

  evening:
    name: 晚报
    runs-on: ubuntu-latest
    if: github.event.schedule == '17 6 * * 1-5' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
        working-directory: stock-feishu-robot

      - run: node evening.js
        working-directory: stock-feishu-robot
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
